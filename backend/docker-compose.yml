version: '3.8'

services:
  db:
    image: postgres:15
    container_name: health_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: health_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: